        </g>
        <!-- Generate 56 cells with varying intensity -->
        <g>
          <!-- Week 1 -->
          <rect x="0" y="0" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="24" y="0" width="22" height="22" fill="#F4EFE6" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="48" y="0" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="72" y="0" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="96" y="0" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="120" y="0" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="144" y="0" width="22" height="22" fill="#F4EFE6" stroke="#1A1A1A" stroke-width="0.5"/>
          <!-- Week 2 -->
          <rect x="0" y="24" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="24" y="24" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="48" y="24" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="72" y="24" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="96" y="24" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="120" y="24" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="144" y="24" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <!-- Week 3 -->
          <rect x="0" y="48" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="24" y="48" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="48" y="48" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="72" y="48" width="22" height="22" fill="#F4EFE6" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="96" y="48" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="120" y="48" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="144" y="48" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <!-- Week 4 -->
          <rect x="0" y="72" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="24" y="72" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="48" y="72" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="72" y="72" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="96" y="72" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="120" y="72" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="144" y="72" width="22" height="22" fill="#F4EFE6" stroke="#1A1A1A" stroke-width="0.5"/>
          <!-- Week 5 -->
          <rect x="0" y="96" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="24" y="96" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="48" y="96" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="72" y="96" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="96" y="96" width="22" height="22" fill="#FFD0DC" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="120" y="96" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
          <rect x="144" y="96" width="22" height="22" fill="#C8484E" stroke="#1A1A1A" stroke-width="0.5"/>
