          <text x="30" y="32">82</text>
          <text x="100" y="72">58</text>
          <text x="170" y="12">94</text>
          <text x="240" y="52">71</text>
          <text x="310" y="92">45</text>
        </g>
      </g>
    </g>

    <!-- Heatmap card -->
