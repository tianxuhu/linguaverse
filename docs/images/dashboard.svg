        <rect x="84" y="80" width="32" height="100" fill="#FFD56B" stroke="#1A1A1A" stroke-width="1.5"/>
        <rect x="154" y="20" width="32" height="160" fill="#3A7D5C"/>
        <rect x="224" y="60" width="32" height="120" fill="#5B8DEF"/>
        <rect x="294" y="100" width="32" height="80" fill="#9B5DE5"/>
        <rect x="354" y="120" width="16" height="60" fill="#1A1A1A"/>
        <!-- values -->
