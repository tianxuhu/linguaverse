        <!-- day labels -->
        <g font-family="'Inter',sans-serif" font-size="9" fill="#1A1A1A" opacity="0.55" text-anchor="end">
          <text x="-6" y="14">一</text>
          <text x="-6" y="38">二</text>
          <text x="-6" y="62">三</text>
          <text x="-6" y="86">四</text>
          <text x="-6" y="110">五</text>
