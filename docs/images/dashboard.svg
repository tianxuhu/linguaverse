        <g font-family="'Inter',sans-serif" font-size="11" fill="#1A1A1A" opacity="0.6" text-anchor="middle">
          <text x="30" y="200">单词</text>
          <text x="100" y="200">语法</text>
          <text x="170" y="200">口语</text>
          <text x="240" y="200">听力</text>
          <text x="310" y="200">阅读</text>
          <text x="370" y="200">写作</text>
