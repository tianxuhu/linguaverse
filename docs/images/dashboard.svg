          <text x="0" y="0" font-family="'Inter',sans-serif" font-size="11" fill="#1A1A1A" opacity="0.6">少</text>
          <rect x="22" y="-10" width="14" height="14" fill="#F4EFE6" stroke="#1A1A1A" stroke-width="0.5"/>
